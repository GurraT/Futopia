<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hex Ring Chemical UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #eef5ff, #ffffff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px 40px 0 40px;
}

.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 3px;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #9be7ff, transparent);
  margin: 10px 0 20px;
}

.layout {
  flex: 1;
  display: flex;
  gap: 30px;
}

.main-box {
  height: 70vh;
  flex: 1;
  padding: 40px;
}

.glass {
  border-radius: 20px;
}

.hex-ring {
  position: relative;
  width: 280px;
  height: 280px;
}

.hex {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #ffffff;

  clip-path: polygon(
    50% 0%, 100% 25%, 100% 75%,
    50% 100%, 0% 75%, 0% 25%
  );

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  transition: none;
  transform: translate(-50%, -50%);
}

.hex img {
  width: 60%;
  height: 60%;
  object-fit: contain;
}

.hex.active {
  transform: translate(-50%, -50%);
  box-shadow: none;
}

/* Positions */
.n1 { top: 0%; left: 50%; }
.n2 { top: 25%; left: 90%; }
.n3 { top: 75%; left: 90%; }
.n4 { top: 100%; left: 50%; }
.n5 { top: 75%; left: 10%; }
.n6 { top: 25%; left: 10%; }

.hex:focus { outline: none; }

/* Footer */
.footer {
  height: 110px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 22px;
}

.control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
}

.arrow, .home {
  font-size: 34px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">CHEMICAL ANALYSIS SYSTEM</h1>
<div class="divider"></div>

<div class="layout">

  <div style="flex:1;">
    <div class="main-box glass">
      <h3>Analysis Core</h3>
      <p>Select a chemical method from the hex ring interface.</p>
    </div>
  </div>

  <div class="hex-ring glass">
    <a class="hex n1" href="#" data-page="gc"><img src="pic/gc.jpg"></a>
    <a class="hex n2" href="#" data-page="hplc"><img src="pic/hplc.jpg"></a>
    <a class="hex n3" href="#" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n4" href="#" data-page="uv"><img src="pic/uv.jpg"></a>
    <a class="hex n5" href="#" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n6" href="#" data-page="hplc"><img src="pic/hplc.jpg"></a>
  </div>

</div>

<div class="footer">
  <div class="control">⚗️ <span class="arrow">⬅</span></div>
  <div class="control">🧪 <span class="home">⌂</span></div>
  <div class="control">🔬 <span class="arrow">➡</span></div>
</div>

</div>

<script>
const hexes = document.querySelectorAll(".hex");
const mainBox = document.querySelector(".main-box");

const pages = {

  gc: `
    <h2>Gas Chromatography (GC)</h2>
    <p>Gas Chromatography separates compounds that can be vaporized.</p>
    <ul>
      <li>Analyzes volatile substances</li>
      <li>Used in environmental and forensic testing</li>
      <li>High sensitivity and accuracy</li>
    </ul>
    <p><a href="https://microbenotes.com/gas-chromatography-gc-principle-instrumentation-applications/" target="_blank">Learn more</a></p>
  `,

  hplc: `
    <h2>HPLC Analysis</h2>
    <p>High Performance Liquid Chromatography separates compounds in liquid samples under pressure.</p>
    <ul>
      <li>Widely used in pharmaceuticals</li>
      <li>High precision separation</li>
      <li>Works with non-volatile compounds</li>
    </ul>
    <p><a href="https://microbenotes.com/high-performance-liquid-chromatography-hplc-principle-instrumentation-applications/" target="_blank">Learn more</a></p>
  `,

  ms: `
    <h2>Mass Spectrometry</h2>
    <p>Mass Spectrometry identifies molecules by measuring mass-to-charge ratios.</p>
    <ul>
      <li>Determines molecular structure</li>
      <li>Highly sensitive detection</li>
      <li>Used in chemistry and biology</li>
    </ul>
    <p><a href="https://microbenotes.com/mass-spectrometry-principle-instrumentation-applications/" target="_blank">Learn more</a></p>
  `,

  uv: `
    <h2>UV Spectroscopy</h2>
    <p>Measures how substances absorb ultraviolet light.</p>
    <ul>
      <li>Detects concentration of compounds</li>
      <li>Fast and simple analysis</li>
      <li>Used in chemistry and biology</li>
    </ul>
    <p><a href="https://microbenotes.com/uv-spectroscopy-principle-instrumentation-applications/" target="_blank">Learn more</a></p>
  `
};

hexes.forEach(hex => {
  hex.addEventListener("click", (e) => {
    e.preventDefault();

    hexes.forEach(h => h.classList.remove("active"));
    hex.classList.add("active");

    const page = hex.getAttribute("data-page");
    mainBox.innerHTML = pages[page] || "<p>No data found</p>";
  });
});
</script>

</body>
</html>
