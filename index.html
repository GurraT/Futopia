<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hex Ring Chemical UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #eef5ff, #ffffff);
  overflow: hidden;
}

/* PAGE */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px 40px 0 40px;
}

/* TITLE */
.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 3px;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #9be7ff, transparent);
  margin: 10px 0 20px;
}

/* LAYOUT */
.layout {
  flex: 1;
  display: flex;
  gap: 30px;
}

/* MAIN */
.main-box {
  height: 70vh;
  flex: 1;
  padding: 40px;
}

/* GLASS */
.glass {
  backdrop-filter: blur(20px);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

/* HEX RING */
.hex-ring {
  position: relative;
  width: 280px;
  height: 280px;
}

/* HEX BUTTON */
.hex {
  position: absolute;
  width: 70px;
  height: 70px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);

  clip-path: polygon(
    50% 0%,
    100% 25%,
    100% 75%,
    50% 100%,
    0% 75%,
    0% 25%
  );

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  transition: 0.25s;
}

/* ICON */
.hex img {
  width: 60%;
  height: 60%;
  object-fit: contain;
}

/* ACTIVE EFFECT */
.hex.active {
  transform: scale(1.15);
  box-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff;
  z-index: 10;
}

/* HEX POSITIONS */
.n1 { top: 0%; left: 50%; transform: translate(-50%, 0); }
.n2 { top: 25%; left: 90%; transform: translate(-50%, -50%); }
.n3 { top: 75%; left: 90%; transform: translate(-50%, -50%); }
.n4 { top: 100%; left: 50%; transform: translate(-50%, -100%); }
.n5 { top: 75%; left: 10%; transform: translate(-50%, -50%); }
.n6 { top: 25%; left: 10%; transform: translate(-50%, -50%); }

/* FOOTER */
.footer {
  height: 110px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 22px;
}

.arrow, .home {
  font-size: 34px;
  cursor: pointer;
  transition: 0.2s;
}

.arrow:hover {
  color: #00bcd4;
  transform: scale(1.25);
}

.home {
  font-size: 38px;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">CHEMICAL ANALYSIS SYSTEM</h1>
<div class="divider"></div>

<div class="layout">

  <!-- MAIN PANEL -->
  <div style="flex:1;">
    <div class="main-box glass">
      <h3>Analysis Core</h3>
      <p>Select a chemical method from the hex ring interface.</p>
    </div>
  </div>

  <!-- HEX RING -->
  <div class="hex-ring glass">

    <a class="hex n1" href="#" data-page="gc">
      <img src="pic/gc.jpg">
    </a>

    <a class="hex n2" href="#" data-page="hplc">
      <img src="pic/hplc.jpg">
    </a>

    <a class="hex n3" href="#" data-page="scale">
      <img src="pic/scale.jpg">
    </a>

    <a class="hex n4" href="#" data-page="uv">
      <img src="pic/uv.jpg">
    </a>

    <a class="hex n5" href="#" data-page="scale">
      <img src="pic/scale.jpg">
    </a>

    <a class="hex n6" href="#" data-page="hplc">
      <img src="pic/hplc.jpg">
    </a>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="arrow">⬅</div>
  <div class="home">⌂</div>
  <div class="arrow">➡</div>
</div>

</div>

<script>
const hexes = document.querySelectorAll(".hex");
const mainBox = document.querySelector(".main-box");

const pages = {
  gc: `
    <h2>Gas Chromatography (GC)</h2>
    <p>Used for separating and analyzing volatile compounds in samples.</p>
  `,
  hplc: `
    <h2>HPLC Analysis</h2>
    <p>High Performance Liquid Chromatography for complex chemical mixtures.</p>
  `,
  scale: `
    <h2>Mass / Scale Analysis</h2>
    <p>Used for molecular mass detection and quantitative analysis.</p>
  `,
  uv: `
    <h2>UV Spectroscopy</h2>
    <p>Measures light absorption in ultraviolet range for chemical identification.</p>
  `
};

hexes.forEach(hex => {
  hex.addEventListener("click", (e) => {
    e.preventDefault();

    hexes.forEach(h => h.classList.remove("active"));
    hex.classList.add("active");

    const page = hex.getAttribute("data-page");

    mainBox.innerHTML = pages[page] || "<p>No data found</p>";
  });
});
</script>

</body>
</html>
