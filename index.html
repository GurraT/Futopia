<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Realistic Glass UI</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: #0f172a;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      perspective: 1200px;
    }

    .container {
      padding: 30px 40px;
      position: relative;
    }

    /* TOP TITLE ONLY */
    .title {
      font-size: 26px;
      letter-spacing: 3px;
      margin: 0;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #9be7ff, transparent);
      margin: 18px 0 30px;
    }

    /* FLOATING ICONS (NOT INSIDE HEADER) */
    .icons-float {
      position: absolute;
      top: 20px;
      right: 40px;
    }

    /* ULTRA GLASS */
    .glass {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow:
        inset 0 1px 3px rgba(255,255,255,0.9),
        inset 0 -1px 2px rgba(0,0,0,0.05),
        0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.9), transparent 70%);
      opacity: 0.35;
      transform: translateX(-100%);
      animation: shine 6s infinite linear;
    }

    @keyframes shine {
      to { transform: translateX(100%); }
    }

    /* HEX ICONS */
    .icons {
      position: relative;
      width: 120px;
      height: 120px;
      transform: scale(0.9);
    }

    .hex {
      position: absolute;
      width: 34px;
      height: 38px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.9);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.9);
      transition: 0.25s;
    }

    .hex img {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    .hex:hover {
      transform: scale(1.25);
    }

    .hex.center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .hex.h1 { top: 0%; left: 50%; transform: translate(-50%, 0); }
    .hex.h2 { top: 25%; left: 80%; transform: translate(-50%, -50%); }
    .hex.h3 { top: 75%; left: 80%; transform: translate(-50%, -50%); }
    .hex.h4 { top: 100%; left: 50%; transform: translate(-50%, -100%); }
    .hex.h5 { top: 75%; left: 20%; transform: translate(-50%, -50%); }
    .hex.h6 { top: 25%; left: 20%; transform: translate(-50%, -50%); }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }

    .main-box {
      padding: 40px;
      min-height: 250px;
    }

    /* MINIMIZED FOOTER (CONTROLS) */
    .controls {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      transform: scale(0.95);
    }

    .btn {
      width: 90px;
      height: 30px;
    }

    .arrow, .home {
      font-size: 24px;
      cursor: pointer;
      transition: 0.2s;
    }

    .arrow:hover {
      color: #00bcd4;
      transform: scale(1.15);
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- TOP TITLE ONLY -->
    <h1 class="title">HOMEPAGE</h1>

    <div class="divider"></div>

    <!-- FLOATING ICONS (NOT INSIDE HEADER) -->
    <div class="icons-float glass" style="padding:10px;">
      <div class="icons">
        <a class="hex center" href="#"><img src="https://img.icons8.com/ios-filled/50/spectrometer.png"></a>
        <a class="hex h1" href="#"><img src="https://img.icons8.com/ios-filled/50/test-tube.png"></a>
        <a class="hex h2" href="#"><img src="https://img.icons8.com/ios-filled/50/molecule.png"></a>
        <a class="hex h3" href="#"><img src="https://img.icons8.com/ios-filled/50/chemical-plant.png"></a>
        <a class="hex h4" href="#"><img src="https://img.icons8.com/ios-filled/50/mass-spectrometry.png"></a>
        <a class="hex h5" href="#"><img src="https://img.icons8.com/ios-filled/50/laser-beam.png"></a>
        <a class="hex h6" href="#"><img src="https://img.icons8.com/ios-filled/50/periodic-table.png"></a>
      </div>
    </div>

    <div class="layout">
      <div>
        <div class="main-box glass">
          <h3>Main DIV</h3>
          <p>Ultra realistic glass panel with lighting & depth.</p>
        </div>

        <div class="controls">
          <div class="btn glass"></div>
          <div class="arrow">⬅</div>
          <div class="home">⌂</div>
          <div class="arrow">➡</div>
          <div class="btn glass"></div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
