<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic Glass UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: #e6f7ff;
      background: radial-gradient(circle at 30% 30%, #0a0f1f, #000 70%);
      overflow-x: hidden;
    }

    /* subtle grid background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      padding: 40px;
    }

    h1 {
      color: #fff;
      letter-spacing: 3px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, cyan, transparent);
      margin: 20px 0 40px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: start;
    }

    /* GLASS EFFECT */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(0,255,255,0.2);
      box-shadow: 0 0 25px rgba(0,255,255,0.08);
    }

    .main-box {
      border-radius: 30px;
      padding: 40px;
      text-align: center;
      min-height: 250px;
    }

    .side-box {
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      min-height: 200px;
    }

    /* HEX RING */
    .icons {
      position: relative;
      width: 220px;
      height: 220px;
      margin-left: auto;
      margin-bottom: 20px;
    }

    .hex {
      position: absolute;
      width: 55px;
      height: 60px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,255,255,0.3);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .hex:hover {
      box-shadow: 0 0 20px cyan;
      transform: scale(1.15);
    }

    .hex.center {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,255,255,0.15);
    }

    .hex.h1 { top: 0%; left: 50%; transform: translate(-50%, 0); }
    .hex.h2 { top: 25%; left: 85%; transform: translate(-50%, -50%); }
    .hex.h3 { top: 75%; left: 85%; transform: translate(-50%, -50%); }
    .hex.h4 { top: 100%; left: 50%; transform: translate(-50%, -100%); }
    .hex.h5 { top: 75%; left: 15%; transform: translate(-50%, -50%); }
    .hex.h6 { top: 25%; left: 15%; transform: translate(-50%, -50%); }

    /* CONTROLS */
    .controls {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .btn {
      width: 120px;
      height: 40px;
      border-radius: 12px;
    }

    .arrow {
      font-size: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    .arrow:hover {
      color: cyan;
      transform: scale(1.2);
    }

    .home {
      font-size: 30px;
    }

    /* hover glow */
    .glass:hover {
      border-color: cyan;
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>HOMEPAGE</h1>
    <div class="divider"></div>

    <div class="icons">
      <div class="hex center">⚙</div>
      <div class="hex h1">📊</div>
      <div class="hex h2">📁</div>
      <div class="hex h3">📋</div>
      <div class="hex h4">🔍</div>
      <div class="hex h5">🧠</div>
      <div class="hex h6">⚡</div>
    </div>

    <div class="layout">
      <div>
        <div class="main-box glass">
          <h3>Main DIV</h3>
          <p>
            Transparent glass UI panel.<br>
            Looks like a futuristic window.
          </p>
        </div>

        <div class="controls">
          <div class="btn glass"></div>
          <div class="arrow">⬅</div>
          <div class="home">⌂</div>
          <div class="arrow">➡</div>
          <div class="btn glass"></div>
        </div>
      </div>

      <div class="side-box glass">
        <h3>Side div</h3>
        <p>
          Glass side panel<br>
          Floating UI feel
        </p>
      </div>
    </div>

  </div>

</body>
</html>
