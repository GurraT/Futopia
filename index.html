<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hex Ring Chemical UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #eef5ff, #ffffff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px 40px 0 40px;
}

.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 3px;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #9be7ff, transparent);
  margin: 10px 0 20px;
}

.layout {
  flex: 1;
  display: flex;
  gap: 30px;
}

/* MAIN BOX */
.main-box {
  height: 70vh;
  flex: 1;
  padding: 20px;
  overflow: auto;
}

/* HEX */
.hex-ring {
  position: relative;
  width: 280px;
  height: 280px;
}

.hex {
  position: absolute;
  width: 70px;
  height: 70px;
  background: white;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transform: translate(-50%, -50%);
}

.hex img {
  width: 60%;
}

/* positions */
.n1 { top: 0%; left: 50%; }
.n2 { top: 25%; left: 90%; }
.n3 { top: 75%; left: 90%; }
.n4 { top: 100%; left: 50%; }
.n5 { top: 75%; left: 10%; }
.n6 { top: 25%; left: 10%; }

/* center */
.center-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 75px;
  height: 75px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: white;
  border: 2px solid #9be7ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
}

/* footer */
.footer {
  height: 110px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
}

.control {
  font-size: 18px;
  cursor: pointer;
  display: flex;
  gap: 8px;
  align-items: center;
}

/* periodic table */
.periodic {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 3px;
}

.el {
  background: white;
  border: 1px solid #ddd;
  padding: 6px;
  font-size: 10px;
  text-align: center;
  cursor: pointer;
}

.el:hover {
  box-shadow: 0 0 10px #9be7ff;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">Laboratorial guidence</h1>
<div class="divider"></div>

<div class="layout">

  <!-- MAIN BOX -->
  <div style="flex:1;">
    <div class="main-box glass" id="mainBox">
   
    </div>
  </div>

<!-- HEX -->
<div class="hex-ring">

<div class="center-icon" id="center">¤</div>

<a class="hex n1" data-page="gc"><img src="pic/gc.jpg"></a>
<a class="hex n2" data-page="hplc"><img src="pic/hplc.jpg"></a>
<a class="hex n3" data-page="ms"><img src="pic/scale.jpg"></a>
<a class="hex n4" data-page="uv"><img src="pic/uv.jpg"></a>
<a class="hex n5" data-page="ms"><img src="pic/scale.jpg"></a>
<a class="hex n6" data-page="hplc"><img src="pic/hplc.jpg"></a>

</div>

</div>

<!-- FOOTER (RESTORED LINKS) -->
<div class="footer">
<div class="control" id="period">Periodic Table</div>
  <div class="control" id="home">⌂</div>
<div class="control" id="analytics">Analytics</div>
</div>

</div>

<script>

const mainBox = document.getElementById("mainBox");

/* HEX PAGES */
const pages = {
  gc:`<h2>GC</h2><p>Volatile compounds analysis.</p>`,
  hplc:`<h2>HPLC</h2><p>Liquid phase separation.</p>`,
  ms:`<h2>MS</h2><p>Molecular identification.</p>`,
  uv:`<h2>UV</h2><p>Absorption spectroscopy.</p>`
};

/* HEX CLICK */
document.querySelectorAll(".hex").forEach(hex=>{
  hex.onclick = () => {
    document.querySelectorAll(".hex").forEach(h=>h.classList.remove("active"));
    hex.classList.add("active");
    mainBox.innerHTML = pages[hex.dataset.page];
  };
});

/* HOME */
document.getElementById("home").onclick = () => {
  mainBox.innerHTML = `<h3>Laboratoral techniques</h3><p
  h6>When working in a laboratory, choosing the correct analytical method is essential for obtaining accurate, reliable, and meaningful results. Each technique serves a specific purpose depending on the type of sample, the information needed, and the required sensitivity.In the table below you can compare the different techniques.</h6>
          <div style="overflow:auto; max-height: 45vh;">
        <table>
          <thead>
            <tr>
              <th>Method</th>
              <th>Best For</th>
              <th>Sample</th>
              <th>Strength</th>
              <th>Limitation</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>GC</td><td>Volatile compounds</td><td>Gas/liquid</td><td>High sensitivity</td><td>Only volatile</td></tr>
            <tr><td>HPLC</td><td>Non-volatile mixtures</td><td>Liquid</td><td>High precision</td><td>Expensive</td></tr>
            <tr><td>MS</td><td>Molecular ID</td><td>All</td><td>Very sensitive</td><td>Complex</td></tr>
            <tr><td>UV-Vis</td><td>Concentration</td><td>Solution</td><td>Fast</td><td>Needs color</td></tr>
            <tr><td>IR</td><td>Functional groups</td><td>All</td><td>Quick ID</td><td>Limited quant</td></tr>
            <tr><td>NMR</td><td>Structure</td><td>Pure compounds</td><td>Detailed</td><td>Very expensive</td></tr>
            <tr><td>ICP-MS</td><td>Trace metals</td><td>Liquid</td><td>Ultra sensitive</td><td>Element only</td></tr>
            <tr><td>Titration</td><td>Concentration</td><td>Liquid</td><td>Accurate</td><td>Manual</td></tr>
          </tbody>
        </table>
        </div>`;
};

/* ANALYTICS */
document.getElementById("analytics").onclick = () => {
  mainBox.innerHTML = `<h2>Analytics Dashboard</h2><p>System performance overview.</p>`;
};

/* CENTER → PERIODIC TABLE */
document.getElementById("center").onclick = () => {
  renderPeriodic();
};

/* FOOTER PERIODIC */
document.getElementById("period").onclick = () => {
  renderPeriodic();
};

/* FULL PERIODIC TABLE */
function renderPeriodic(){

const layout = [
["H","","","","","","","","","","","","","","","","","He"],
["Li","Be","","","","","","","","","","","B","C","N","O","F","Ne"],
["Na","Mg","","","","","","","","","","","Al","Si","P","S","Cl","Ar"],
["K","Ca","Sc","Ti","V","Cr","Mn","Fe","Co","Ni","Cu","Zn","Ga","Ge","As","Se","Br","Kr"],
["Rb","Sr","Y","Zr","Nb","Mo","Tc","Ru","Rh","Pd","Ag","Cd","In","Sn","Sb","Te","I","Xe"],
["Cs","Ba","La","Hf","Ta","W","Re","Os","Ir","Pt","Au","Hg","Tl","Pb","Bi","Po","At","Rn"],
["Fr","Ra","Ac","","","","","","","","","","","","","","",""]
];

let html = `<div class="periodic">`;

layout.forEach(row=>{
  row.forEach(el=>{
    if(el==="") html+=`<div></div>`;
    else html+=`<div class="el">${el}</div>`;
  });
});

html += `</div>`;

mainBox.innerHTML = html;
}

</script>

</body>
</html>
