<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultra Realistic Glass UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
height: 100%;
}

body {
font-family: 'Orbitron', sans-serif;
background: linear-gradient(135deg, #dfe9f3, #ffffff);
color: #0f172a;
}

/* CONTAINER */
.container {
height: 100vh;
padding: 15px 40px 0 40px;
display: flex;
flex-direction: column;
}

/* TITLE */
.title {
font-size: 26px;
letter-spacing: 3px;
margin: 0;
}

.divider {
height: 2px;
background: linear-gradient(90deg, transparent, #9be7ff, transparent);
margin: 10px 0 20px;
}

/* LAYOUT AREA */
.layout {
flex: 1;
display: flex;
gap: 30px;
position: relative;
}

/* MAIN TAKES 70% HEIGHT */
.main-box {
height: 70vh;
flex: 1;
padding: 40px;
}

/* GLASS */
.glass {
background: rgba(255, 255, 255, 0.35);
backdrop-filter: blur(20px);
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.7);
box-shadow:
inset 0 1px 3px rgba(255,255,255,0.9),
inset 0 -1px 2px rgba(0,0,0,0.05),
0 10px 30px rgba(0,0,0,0.1);
overflow: hidden;
position: relative;
}

.glass::before {
content: "";
position: absolute;
inset: 0;
background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.9), transparent 70%);
opacity: 0.35;
transform: translateX(-100%);
animation: shine 6s infinite linear;
}

@keyframes shine {
to { transform: translateX(100%); }
}

/* ICONS RIGHT SIDE (NO WRAPPER) */
.hex {
position: absolute;
width: 34px;
height: 38px;
background: rgba(255,255,255,0.6);
border: 1px solid rgba(255,255,255,0.9);
clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(10px);
transition: 0.25s;
transform: scale(0.9);
}

.hex img {
width: 18px;
height: 18px;
}

.hex:hover {
transform: scale(1.25);
}

.icon-set { right: 40px; }

.center { top: 20px; }
.h1 { top: 100px; }
.h2 { top: 180px; }
.h3 { top: 260px; }
.h4 { top: 340px; }
.h5 { top: 420px; }
.h6 { top: 500px; }

/* FOOTER CONTROLS */
.footer {
height: 80px;
display: flex;
justify-content: center;
align-items: center;
gap: 14px;
}

.btn {
width: 90px;
height: 30px;
}

.arrow, .home {
font-size: 24px;
cursor: pointer;
transition: 0.2s;
}

.arrow:hover {
color: #00bcd4;
transform: scale(1.15);
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">HOMEPAGE</h1>
<div class="divider"></div>

<div class="layout">

  <!-- MAIN (70% HEIGHT) -->
  <div style="flex:1;">
    <div class="main-box glass">
      <h3>Main DIV</h3>
      <p>Ultra realistic glass panel with lighting & depth.</p>
    </div>
  </div>

  <!-- ICONS (NO DIV WRAPPER) -->
  <a class="hex center icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/spectrometer.png"></a>
  <a class="hex h1 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/test-tube.png"></a>
  <a class="hex h2 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/molecule.png"></a>
  <a class="hex h3 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/chemical-plant.png"></a>
  <a class="hex h4 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/mass-spectrometry.png"></a>
  <a class="hex h5 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/laser-beam.png"></a>
  <a class="hex h6 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/periodic-table.png"></a>

</div>

<!-- FOOTER CONTROLS -->
<div class="footer">
<div class="btn glass"></div>
<div class="arrow">⬅</div>
<div class="home">⌂</div>
<div class="arrow">➡</div>
<div class="btn glass"></div>
</div>

</div>

</body>
</html>
