<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chem Analysis HUD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
margin: 0;
padding: 0;
height: 100%;
font-family: 'Orbitron', sans-serif;
background: radial-gradient(circle at center, #eaf3ff, #ffffff);
overflow: hidden;
}

/* CONTAINER */
.container {
height: 100vh;
display: flex;
flex-direction: column;
padding: 15px 40px 0 40px;
}

/* TITLE */
.title {
margin: 0;
font-size: 26px;
letter-spacing: 3px;
}

.divider {
height: 2px;
background: linear-gradient(90deg, transparent, #9be7ff, transparent);
margin: 10px 0 20px;
}

/* LAYOUT */
.layout {
flex: 1;
display: flex;
gap: 30px;
position: relative;
}

/* MAIN PANEL */
.main-box {
height: 70vh;
flex: 1;
padding: 40px;
}

/* GLASS */
.glass {
background: rgba(255,255,255,0.35);
backdrop-filter: blur(20px);
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.7);
box-shadow:
inset 0 1px 3px rgba(255,255,255,0.9),
inset 0 -1px 2px rgba(0,0,0,0.05),
0 10px 30px rgba(0,0,0,0.1);
position: relative;
overflow: hidden;
}

/* HUD CLUSTER */
.hud {
position: absolute;
right: 40px;
top: 50%;
transform: translateY(-50%);
width: 280px;
height: 280px;
}

/* ENERGY RING */
.hud::before {
content: "";
position: absolute;
inset: 0;
border-radius: 50%;
border: 1px solid rgba(0,150,255,0.25);
box-shadow: 0 0 20px rgba(0,150,255,0.25);
animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
0%,100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.06); opacity: 0.6; }
}

/* CORE */
.core {
position: absolute;
top: 50%;
left: 50%;
width: 65px;
height: 65px;
transform: translate(-50%, -50%);
border-radius: 50%;
background: radial-gradient(circle, rgba(0,150,255,0.5), transparent);
box-shadow: 0 0 25px rgba(0,150,255,0.4);
}

/* HEX NODE */
.hex {
position: absolute;
width: 42px;
height: 46px;
background: rgba(255,255,255,0.65);
border: 1px solid rgba(0,150,255,0.25);
clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(10px);
transition: 0.25s;
}

.hex img {
width: 22px;
height: 22px;
}

.hex:hover {
transform: scale(1.3);
box-shadow: 0 0 14px rgba(0,150,255,0.4);
}

/* ORBIT POSITIONS */
.n1 { top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(0deg) translate(110px); }
.n2 { top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(60deg) translate(110px); }
.n3 { top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(120deg) translate(110px); }
.n4 { top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(180deg) translate(110px); }
.n5 { top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(240deg) translate(110px); }
.n6 { top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(300deg) translate(110px); }

/* FOOTER */
.footer {
height: 80px;
display: flex;
justify-content: center;
align-items: center;
gap: 14px;
}

.arrow, .home {
font-size: 24px;
cursor: pointer;
transition: 0.2s;
}

.arrow:hover {
color: #00bcd4;
transform: scale(1.2);
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">CHEMICAL ANALYSIS SYSTEM</h1>
<div class="divider"></div>

<div class="layout">

<!-- MAIN -->
<div style="flex:1;">
  <div class="main-box glass">
    <h3>Analytical Control Core</h3>
    <p>All chemical analysis systems online.</p>
  </div>
</div>

<!-- HUD CLUSTER -->
<div class="hud glass">

  <div class="core"></div>

  <!-- Mass Spectrometry -->
  <a class="hex n1" href="#">
    <img src="https://img.icons8.com/ios-filled/50/spectrometer.png">
  </a>

  <!-- Chromatography -->
  <a class="hex n2" href="#">
    <img src="https://img.icons8.com/ios-filled/50/test-tube.png">
  </a>

  <!-- NMR -->
  <a class="hex n3" href="#">
    <img src="https://img.icons8.com/ios-filled/50/molecule.png">
  </a>

  <!-- Infrared (FTIR) -->
  <a class="hex n4" href="#">
    <img src="https://img.icons8.com/ios-filled/50/infrared-spectroscopy.png">
  </a>

  <!-- UV-Vis -->
  <a class="hex n5" href="#">
    <img src="https://img.icons8.com/ios-filled/50/visible-spectrum.png">
  </a>

  <!-- X-Ray Diffraction -->
  <a class="hex n6" href="#">
    <img src="https://img.icons8.com/ios-filled/50/x-ray.png">
  </a>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
<div class="arrow">⬅</div>
<div class="home">⌂</div>
<div class="arrow">➡</div>
</div>

</div>

</body>
</html>
