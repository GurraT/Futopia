<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hex Ring Chemical UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #eef5ff, #ffffff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px 40px 0 40px;
}

.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 3px;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #9be7ff, transparent);
  margin: 10px 0 20px;
}

.layout {
  flex: 1;
  display: flex;
  gap: 30px;
}

.main-box {
  height: 70vh;
  flex: 1;
  padding: 40px;
}

.glass {
  border-radius: 20px;
}

.hex-ring {
  position: relative;
  width: 280px;
  height: 280px;
}

.hex {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #ffffff;

  clip-path: polygon(
    50% 0%, 100% 25%, 100% 75%,
    50% 100%, 0% 75%, 0% 25%
  );

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  transform: translate(-50%, -50%);
}

.hex img {
  width: 60%;
  height: 60%;
  object-fit: contain;
}

.hex.active {
  box-shadow: 0 0 15px #9be7ff;
}

/* Positions */
.n1 { top: 0%; left: 50%; }
.n2 { top: 25%; left: 90%; }
.n3 { top: 75%; left: 90%; }
.n4 { top: 100%; left: 50%; }
.n5 { top: 75%; left: 10%; }
.n6 { top: 25%; left: 10%; }

.footer {
  height: 110px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 22px;
}

.control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
}

.arrow, .home {
  font-size: 34px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">CHEMICAL ANALYSIS SYSTEM</h1>
<div class="divider"></div>

<div class="layout">

  <div style="flex:1;">
    <div class="main-box glass" id="mainBox">
      <h3>Analysis Core</h3>
      <p>Select a chemical method from the hex ring interface.</p>
    </div>
  </div>

  <div class="hex-ring glass">
    <a class="hex n1" href="#" data-page="gc"><img src="pic/gc.jpg"></a>
    <a class="hex n2" href="#" data-page="hplc"><img src="pic/hplc.jpg"></a>
    <a class="hex n3" href="#" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n4" href="#" data-page="uv"><img src="pic/uv.jpg"></a>
    <a class="hex n5" href="#" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n6" href="#" data-page="hplc"><img src="pic/hplc.jpg"></a>
  </div>

</div>

<div class="footer">
  <div class="control"><span class="arrow" id="period">Periodic Table</span></div>
  <div class="control"><span class="arrow" id="back">⬅</span></div>
  <div class="control"><span class="home" id="home">⌂</span></div>
  <div class="control"><span class="arrow" id="forward">➡</span></div>
  <div class="control"><span class="arrow" id="analytics">Analytics</span></div>
</div>

</div>

<script>
const hexes = document.querySelectorAll(".hex");
const mainBox = document.getElementById("mainBox");

let historyStack = [];
let currentIndex = -1;
let currentHexIndex = 0;

const pages = {

  gc: `
    <h2>Gas Chromatography (GC)</h2>
    <p>Separates compounds that can be vaporized.</p>
    <ul>
      <li>Analyzes volatile substances</li>
      <li>Environmental & forensic use</li>
      <li>High sensitivity</li>
    </ul>
  `,

  hplc: `
    <h2>HPLC Analysis</h2>
    <p>Separates compounds in liquid samples under pressure.</p>
    <ul>
      <li>Pharmaceutical standard</li>
      <li>High precision</li>
      <li>Non-volatile compounds</li>
    </ul>
  `,

  ms: `
    <h2>Mass Spectrometry</h2>
    <p>Identifies molecules by mass-to-charge ratio.</p>
    <ul>
      <li>Structure analysis</li>
      <li>Highly sensitive</li>
      <li>Chemistry & biology</li>
    </ul>
  `,

  uv: `
    <h2>UV Spectroscopy</h2>
    <p>Measures UV light absorption.</p>
    <ul>
      <li>Concentration detection</li>
      <li>Fast analysis</li>
      <li>Widely used</li>
    </ul>
  `
};

function loadPage(pageKey) {
  if (!pages[pageKey]) return;

  mainBox.innerHTML = pages[pageKey];

  if (historyStack[currentIndex] !== pageKey) {
    historyStack = historyStack.slice(0, currentIndex + 1);
    historyStack.push(pageKey);
    currentIndex++;
  }
}

// HEX CLICK
hexes.forEach((hex, index) => {
  hex.addEventListener("click", (e) => {
    e.preventDefault();

    hexes.forEach(h => h.classList.remove("active"));
    hex.classList.add("active");

    const page = hex.getAttribute("data-page");
    loadPage(page);

    currentHexIndex = index;
  });
});

// BACK
document.getElementById("back").onclick = () => {
  if (currentIndex > 0) {
    currentIndex--;
    mainBox.innerHTML = pages[historyStack[currentIndex]];
  }
};

// FORWARD
document.getElementById("forward").onclick = () => {
  currentHexIndex = (currentHexIndex + 1) % hexes.length;
  hexes[currentHexIndex].click();
};

// HOME
document.getElementById("home").onclick = () => {
  mainBox.innerHTML = `
    <h3>Analysis Core</h3>
    <p>Select a chemical method from the hex ring interface.</p>
  `;
  hexes.forEach(h => h.classList.remove("active"));
  historyStack = [];
  currentIndex = -1;
};

// ANALYTICS
document.getElementById("analytics").onclick = () => {
  mainBox.innerHTML = `
    <h2>Analytics Dashboard</h2>
    <ul>
      <li>Sample throughput</li>
      <li>Instrument efficiency</li>
      <li>Data trends</li>
    </ul>
  `;
};

// PERIODIC TABLE
document.getElementById("period").onclick = () => {
  mainBox.innerHTML = `
    <h2>Periodic Table</h2>
    <p><a href="https://ptable.com" target="_blank">Open Interactive Table</a></p>
  `;
};
</script>

</body>
</html>
