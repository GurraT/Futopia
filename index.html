<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sci-Fi HUD Cluster</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
height: 100%;
}

body {
font-family: 'Orbitron', sans-serif;
background: radial-gradient(circle at center, #eaf3ff, #ffffff);
color: #0f172a;
overflow: hidden;
}

/* CONTAINER */
.container {
height: 100vh;
display: flex;
flex-direction: column;
padding: 15px 40px 0 40px;
}

/* TITLE */
.title {
margin: 0;
font-size: 26px;
letter-spacing: 3px;
}

.divider {
height: 2px;
background: linear-gradient(90deg, transparent, #9be7ff, transparent);
margin: 10px 0 20px;
}

/* MAIN LAYOUT */
.layout {
flex: 1;
display: flex;
gap: 30px;
position: relative;
}

/* MAIN PANEL */
.main-box {
height: 70vh;
flex: 1;
padding: 40px;
}

/* GLASS */
.glass {
background: rgba(255, 255, 255, 0.35);
backdrop-filter: blur(20px);
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.7);
box-shadow:
inset 0 1px 3px rgba(255,255,255,0.9),
inset 0 -1px 2px rgba(0,0,0,0.05),
0 10px 30px rgba(0,0,0,0.1);
position: relative;
overflow: hidden;
}

.glass::before {
content: "";
position: absolute;
inset: 0;
background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.9), transparent 70%);
opacity: 0.35;
transform: translateX(-100%);
animation: shine 6s infinite linear;
}

@keyframes shine {
to { transform: translateX(100%); }
}

/* ========================= */
/* HUD CONTROL CLUSTER */
/* ========================= */

.hud-cluster {
position: absolute;
right: 40px;
top: 50%;
transform: translateY(-50%);
width: 260px;
height: 260px;
}

/* OUTER ENERGY RING */
.hud-cluster::before {
content: "";
position: absolute;
inset: 0;
border-radius: 50%;
border: 1px solid rgba(0, 150, 255, 0.25);
box-shadow:
0 0 15px rgba(0,150,255,0.2),
inset 0 0 20px rgba(0,150,255,0.08);
animation: pulse 4s infinite ease-in-out;
}

/* INNER CORE */
.core {
position: absolute;
top: 50%;
left: 50%;
width: 60px;
height: 60px;
transform: translate(-50%, -50%);
border-radius: 50%;
background: radial-gradient(circle, rgba(0,150,255,0.4), transparent);
box-shadow: 0 0 25px rgba(0,150,255,0.4);
}

/* HEX NODES */
.hex {
position: absolute;
width: 36px;
height: 40px;
background: rgba(255,255,255,0.65);
border: 1px solid rgba(0,150,255,0.2);
clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(10px);
transition: 0.25s;
}

.hex img {
width: 18px;
height: 18px;
}

.hex:hover {
transform: scale(1.35);
box-shadow: 0 0 12px rgba(0,150,255,0.4);
}

/* ORBIT POSITIONS */
.n1 { top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(0deg) translate(105px) rotate(0deg); }
.n2 { top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(60deg) translate(105px) rotate(-60deg); }
.n3 { top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(120deg) translate(105px) rotate(-120deg); }
.n4 { top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(180deg) translate(105px) rotate(-180deg); }
.n5 { top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(240deg) translate(105px) rotate(-240deg); }
.n6 { top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(300deg) translate(105px) rotate(-300deg); }

/* PULSE ANIMATION */
@keyframes pulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.08); opacity: 0.7; }
}

/* FOOTER */
.footer {
height: 80px;
display: flex;
justify-content: center;
align-items: center;
gap: 14px;
}

.arrow, .home {
font-size: 24px;
cursor: pointer;
transition: 0.2s;
}

.arrow:hover {
color: #00bcd4;
transform: scale(1.2);
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">HOMEPAGE</h1>
<div class="divider"></div>

<div class="layout">

  <!-- MAIN -->
  <div style="flex:1;">
    <div class="main-box glass">
      <h3>Main Control Node</h3>
      <p>Sci-fi interface system active.</p>
    </div>
  </div>

  <!-- HUD CLUSTER -->
  <div class="hud-cluster">

    <div class="core"></div>

    <a class="hex n1" href="#"><img src="https://img.icons8.com/ios-filled/50/spectrometer.png"></a>
    <a class="hex n2" href="#"><img src="https://img.icons8.com/ios-filled/50/test-tube.png"></a>
    <a class="hex n3" href="#"><img src="https://img.icons8.com/ios-filled/50/molecule.png"></a>
    <a class="hex n4" href="#"><img src="https://img.icons8.com/ios-filled/50/chemical-plant.png"></a>
    <a class="hex n5" href="#"><img src="https://img.icons8.com/ios-filled/50/mass-spectrometry.png"></a>
    <a class="hex n6" href="#"><img src="https://img.icons8.com/ios-filled/50/laser-beam.png"></a>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
<div class="arrow">⬅</div>
<div class="home">⌂</div>
<div class="arrow">➡</div>
</div>

</div>

</body>
</html>
