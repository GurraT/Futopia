<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chem UI Minimal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
height: 100%;
font-family: 'Orbitron', sans-serif;
background: linear-gradient(135deg, #eef5ff, #ffffff);
}

/* PAGE */
.container {
height: 100vh;
display: flex;
flex-direction: column;
padding: 15px 40px 0 40px;
}

/* TITLE */
.title {
margin: 0;
font-size: 26px;
letter-spacing: 3px;
}

.divider {
height: 2px;
background: linear-gradient(90deg, transparent, #9be7ff, transparent);
margin: 10px 0 20px;
}

/* LAYOUT */
.layout {
flex: 1;
display: flex;
gap: 30px;
align-items: flex-start;
}

/* MAIN */
.main-box {
height: 70vh;
flex: 1;
padding: 40px;
}

/* GLASS */
.glass {
background: rgba(255,255,255,0.35);
backdrop-filter: blur(20px);
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.7);
box-shadow:
inset 0 1px 3px rgba(255,255,255,0.9),
inset 0 -1px 2px rgba(0,0,0,0.05),
0 10px 30px rgba(0,0,0,0.1);
position: relative;
overflow: hidden;
}

/* ===================== */
/* SIMPLE HEX ICON STACK */
/* ===================== */

.hex {
position: absolute;
right: 40px;
width: 46px;
height: 50px;

background: rgba(255,255,255,0.7);
border: 1px solid rgba(0,120,200,0.25);

clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);

display: flex;
align-items: center;
justify-content: center;

backdrop-filter: blur(10px);
transition: 0.25s;
}

.hex img {
width: 22px;
height: 22px;
}

.hex:hover {
transform: scale(1.25);
box-shadow: 0 0 12px rgba(0,120,200,0.25);
}

/* VERTICAL STACK POSITIONS (NO RING, NO HUD) */
.i1 { top: 120px; }
.i2 { top: 190px; }
.i3 { top: 260px; }
.i4 { top: 330px; }
.i5 { top: 400px; }
.i6 { top: 470px; }

/* FOOTER */
.footer {
height: 80px;
display: flex;
justify-content: center;
align-items: center;
gap: 14px;
}

.arrow, .home {
font-size: 24px;
cursor: pointer;
transition: 0.2s;
}

.arrow:hover {
color: #00bcd4;
transform: scale(1.2);
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">CHEMICAL ANALYSIS</h1>
<div class="divider"></div>

<div class="layout">

<!-- MAIN -->
<div style="flex:1;">
  <div class="main-box glass">
    <h3>Control Panel</h3>
    <p>Select analysis method.</p>
  </div>
</div>

<!-- PURE ICONS (NO HUD, NO RING, NO WRAPPERS) -->

<a class="hex i1" href="#"><img src="https://img.icons8.com/ios-filled/50/spectrometer.png"></a>
<a class="hex i2" href="#"><img src="https://img.icons8.com/ios-filled/50/test-tube.png"></a>
<a class="hex i3" href="#"><img src="https://img.icons8.com/ios-filled/50/molecule.png"></a>
<a class="hex i4" href="#"><img src="https://img.icons8.com/ios-filled/50/infrared-spectroscopy.png"></a>
<a class="hex i5" href="#"><img src="https://img.icons8.com/ios-filled/50/visible-spectrum.png"></a>
<a class="hex i6" href="#"><img src="https://img.icons8.com/ios-filled/50/x-ray.png"></a>

</div>

<!-- FOOTER -->
<div class="footer">
<div class="arrow">⬅</div>
<div class="home">⌂</div>
<div class="arrow">➡</div>
</div>

</div>

</body>
</html>
