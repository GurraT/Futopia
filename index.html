<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hex Ring Chemical UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #eef5ff, #ffffff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px 40px 0 40px;
}

.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 3px;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #9be7ff, transparent);
  margin: 10px 0 20px;
}

.layout {
  flex: 1;
  display: flex;
  gap: 30px;
}

/* MAIN BOX */
.main-box {
  height: 70vh;
  flex: 1;
  padding: 20px;
  overflow: auto;
}

/* HEX RING */
.hex-ring {
  position: relative;
  width: 280px;
  height: 280px;
}

.hex {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #ffffff;

  clip-path: polygon(
    50% 0%, 100% 25%, 100% 75%,
    50% 100%, 0% 75%, 0% 25%
  );

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  transform: translate(-50%, -50%);
}

.hex img {
  width: 60%;
  height: 60%;
  object-fit: contain;
}

.hex.active {
  box-shadow: 0 0 15px #9be7ff;
}

/* POSITIONS */
.n1 { top: 0%; left: 50%; }
.n2 { top: 25%; left: 90%; }
.n3 { top: 75%; left: 90%; }
.n4 { top: 100%; left: 50%; }
.n5 { top: 75%; left: 10%; }
.n6 { top: 25%; left: 10%; }

/* CENTER BUTTON */
.center-icon {
  position: absolute;
  top: 50%;
  left: 50%;

  width: 75px;
  height: 75px;

  transform: translate(-50%, -50%);
  border-radius: 50%;

  background: white;
  border: 2px solid #9be7ff;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 30px;
  cursor: pointer;

  box-shadow: 0 0 15px rgba(155, 231, 255, 0.5);
  transition: 0.3s;
}

.center-icon:hover {
  transform: translate(-50%, -50%) scale(1.1);
  box-shadow: 0 0 25px #9be7ff;
}

/* FOOTER */
.footer {
  height: 110px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 22px;
}

.control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
}

.arrow, .home {
  font-size: 34px;
  cursor: pointer;
}

/* PERIODIC TABLE */
.periodic-grid {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 4px;
}

.element {
  background: white;
  border: 1px solid #d9e8ff;
  border-radius: 6px;
  padding: 6px;
  font-size: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.element:hover {
  box-shadow: 0 0 10px #9be7ff;
  transform: scale(1.05);
}

.tech-panel {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.7);
  border: 1px solid #d9e8ff;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">CHEMICAL ANALYSIS SYSTEM</h1>
<div class="divider"></div>

<div class="layout">

  <!-- MAIN BOX -->
  <div style="flex:1;">
    <div class="main-box glass" id="mainBox">

      <h3>Analysis Core</h3>
      <p>Select a chemical method or open periodic system.</p>

    </div>
  </div>

  <!-- HEX RING -->
  <div class="hex-ring">

    <div class="center-icon" id="periodicCenter">⚛️</div>

    <a class="hex n1" href="#" data-page="gc"><img src="pic/gc.jpg"></a>
    <a class="hex n2" href="#" data-page="hplc"><img src="pic/hplc.jpg"></a>
    <a class="hex n3" href="#" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n4" href="#" data-page="uv"><img src="pic/uv.jpg"></a>
    <a class="hex n5" href="#" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n6" href="#" data-page="hplc"><img src="pic/hplc.jpg"></a>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="control"><h4 id="period">Periodic</h4></div>
  <div class="control"><span class="home" id="home">⌂</span></div>
</div>

</div>

<script>
const mainBox = document.getElementById("mainBox");

/* ---------------------------
   BASIC HEX PAGES
--------------------------- */
const pages = {
  gc: `<h2>Gas Chromatography</h2><p>Volatile compound separation.</p>`,
  hplc: `<h2>HPLC</h2><p>Liquid phase separation.</p>`,
  ms: `<h2>Mass Spectrometry</h2><p>Molecular identification.</p>`,
  uv: `<h2>UV Spectroscopy</h2><p>Light absorption analysis.</p>`
};

document.querySelectorAll(".hex").forEach(hex => {
  hex.addEventListener("click", (e) => {
    e.preventDefault();
    const page = hex.dataset.page;
    mainBox.innerHTML = pages[page];
  });
});

/* ---------------------------
   PERIODIC DATA
--------------------------- */
const periodicData = [
  {symbol:"H", name:"Hydrogen", col:1, row:1, tech:["MS","IR","UV"]},
  {symbol:"He", name:"Helium", col:18, row:1, tech:["GC","MS"]},
  {symbol:"C", name:"Carbon", col:14, row:2, tech:["MS","NMR","IR","GC-MS"]},
  {symbol:"N", name:"Nitrogen", col:15, row:2, tech:["GC","MS"]},
  {symbol:"O", name:"Oxygen", col:16, row:2, tech:["IR","UV","MS"]},
  {symbol:"Na", name:"Sodium", col:1, row:3, tech:["AAS","ICP-MS"]},
  {symbol:"Cl", name:"Chlorine", col:17, row:3, tech:["GC","MS","Titration"]},
  {symbol:"Fe", name:"Iron", col:8, row:4, tech:["AAS","ICP-MS","XRD"]},
  {symbol:"Cu", name:"Copper", col:11, row:4, tech:["AAS","ICP-MS","XRF"]},
  {symbol:"Au", name:"Gold", col:11, row:6, tech:["XRF","ICP-MS","SEM"]}
];

function renderPeriodicTable() {
  let grid = `<div class="periodic-grid">`;

  periodicData.forEach(el => {
    grid += `
      <div class="element"
           style="grid-column:${el.col}; grid-row:${el.row}"
           onclick="selectElement('${el.symbol}')">
        <b>${el.symbol}</b>
      </div>
    `;
  });

  grid += `</div>
    <div id="techPanel" class="tech-panel">
      Click an element to see analysis techniques
    </div>`;

  mainBox.innerHTML = grid;
}

function selectElement(symbol) {
  const el = periodicData.find(e => e.symbol === symbol);

  document.getElementById("techPanel").innerHTML = `
    <h3>${el.name} (${el.symbol})</h3>
    <p><b>Recommended Techniques:</b></p>
    <ul>
      ${el.tech.map(t => `<li>${t}</li>`).join("")}
    </ul>
  `;
}

/* ---------------------------
   CENTER BUTTON
--------------------------- */
document.getElementById("periodicCenter").onclick = () => {
  renderPeriodicTable();
};

/* ---------------------------
   HOME
--------------------------- */
document.getElementById("home").onclick = () => {
  mainBox.innerHTML = `
    <h3>Analysis Core</h3>
    <p>Select a chemical method or open periodic system.</p>
  `;
};

/* ---------------------------
   FOOTER PERIODIC BUTTON
--------------------------- */
document.getElementById("period").onclick = () => {
  renderPeriodicTable();
};
</script>

</body>
</html>
