<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hex Ring Chemical UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #eef5ff, #ffffff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px 40px 0 40px;
}

.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 3px;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #9be7ff, transparent);
  margin: 10px 0 20px;
}

.layout {
  flex: 1;
  display: flex;
  gap: 30px;
}

/* MAIN BOX */
.main-box {
  height: 70vh;
  flex: 1;
  padding: 20px;
  overflow: auto;
}

/* HEX */
.hex-ring {
  position: relative;
  width: 280px;
  height: 280px;
}

.hex {
  position: absolute;
  width: 70px;
  height: 70px;
  background: white;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transform: translate(-50%, -50%);
}

.hex img {
  width: 60%;
}

/* positions */
.n1 { top: 0%; left: 50%; }
.n2 { top: 25%; left: 90%; }
.n3 { top: 75%; left: 90%; }
.n4 { top: 100%; left: 50%; }
.n5 { top: 75%; left: 10%; }
.n6 { top: 25%; left: 10%; }

/* center */
.center-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 75px;
  height: 75px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: white;
  border: 2px solid #9be7ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
}

/* footer */
.footer {
  height: 110px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
}

.control {
  font-size: 18px;
  cursor: pointer;
}

/* periodic table */
.periodic {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 3px;
}

/* ELEMENT STYLE */
.el {
  background: white;
  border: 1px solid #ddd;
  padding: 6px;
  font-size: 10px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

/* COLORS */
.icp { background: #d0f0ff; }
.aas { background: #d8ffd8; }
.xrf { background: #f3d8ff; }
.ms  { background: #ffe4cc; }
.ir  { background: #fff4b3; }

/* MULTI */
.multi {
  box-shadow: 0 0 10px #9be7ff;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  color: white;
  padding: 5px 8px;
  font-size: 10px;
  border-radius: 5px;
  white-space: nowrap;
  display: none;
}

.el:hover .tooltip {
  display: block;
}

/* TABLE */
.styled-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  background: white;
}

.styled-table th,
.styled-table td {
  padding: 8px;
  border: 1px solid #ddd;
}

.styled-table th {
  background: #eef5ff;
  position: sticky;
  top: 0;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">Laboratorial guidance</h1>
<div class="divider"></div>

<div class="layout">

  <div style="flex:1;">
    <div class="main-box" id="mainBox"></div>
  </div>

  <div class="hex-ring">
    <div class="center-icon" id="center">¤</div>

    <div class="hex n1" data-page="gc"><img src="pic/gc.jpg"></div>
    <div class="hex n2" data-page="hplc"><img src="pic/hplc.jpg"></div>
    <div class="hex n3" data-page="ms"><img src="pic/scale.jpg"></div>
    <div class="hex n4" data-page="uv"><img src="pic/uv.jpg"></div>
    <div class="hex n5" data-page="ms"><img src="pic/scale.jpg"></div>
    <div class="hex n6" data-page="hplc"><img src="pic/hplc.jpg"></div>
  </div>

</div>

<div class="footer">
  <div class="control" id="period">Periodic Table</div>
  <div class="control" id="home">⌂</div>
  <div class="control" id="analytics">Analytics</div>
</div>

</div>

<script>

const mainBox = document.getElementById("mainBox");

/* DETECTION MAP */
const detectionMap = {
  H:["MS"], He:["MS"],
  Li:["ICP-MS","AAS"], Be:["ICP-MS","AAS"],
  B:["ICP-MS"], C:["MS","IR"], N:["MS","IR"], O:["MS","IR"],
  Na:["ICP-MS","AAS"], Mg:["ICP-MS","AAS"],
  Al:["ICP-MS","AAS","XRF"], Si:["ICP-MS","XRF"],
  P:["ICP-MS"], S:["ICP-MS","IR"], Cl:["ICP-MS"],
  K:["ICP-MS","AAS"], Ca:["ICP-MS","AAS"],
  Fe:["ICP-MS","AAS","XRF"], Cu:["ICP-MS","AAS","XRF"],
  Zn:["ICP-MS","AAS"], Ag:["ICP-MS","AAS","XRF"],
  Au:["ICP-MS","XRF"], Pb:["ICP-MS","AAS","XRF"]
};

/* HEX PAGES */
const pages = {
  gc:`<h2>GC</h2><p>Volatile compounds analysis.</p>`,
  hplc:`<h2>HPLC</h2><p>Liquid phase separation.</p>`,
  ms:`<h2>MS</h2><p>Molecular identification.</p>`,
  uv:`<h2>UV</h2><p>Absorption spectroscopy.</p>`
};

document.querySelectorAll(".hex").forEach(hex=>{
  hex.onclick = () => {
    mainBox.innerHTML = pages[hex.dataset.page];
  };
});

/* HOME */
document.getElementById("home").onclick = () => {
  mainBox.innerHTML = `
    <h3>Laboratory techniques</h3>
    <p style="max-width:700px;">
      Choose the right analytical method based on your sample and goal.
    </p>

    <div style="overflow:auto; max-height:45vh;">
      <table class="styled-table">
        <thead>
          <tr>
            <th>Method</th><th>Best For</th><th>Sample</th><th>Strength</th><th>Limitation</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>GC</td><td>Volatile</td><td>Gas</td><td>Sensitive</td><td>Only volatile</td></tr>
          <tr><td>HPLC</td><td>Non-volatile</td><td>Liquid</td><td>Precise</td><td>Expensive</td></tr>
          <tr><td>MS</td><td>ID</td><td>All</td><td>Very sensitive</td><td>Complex</td></tr>
          <tr><td>UV</td><td>Concentration</td><td>Solution</td><td>Fast</td><td>Needs color</td></tr>
        </tbody>
      </table>
    </div>
  `;
};

/* PERIODIC TABLE */
function renderPeriodic(){

const layout = [
["H","","","","","","","","","","","","","","","","","He"],
["Li","Be","","","","","","","","","","","B","C","N","O","F","Ne"],
["Na","Mg","","","","","","","","","","","Al","Si","P","S","Cl","Ar"]
];

let html = `<div class="periodic">`;

layout.forEach(row=>{
  row.forEach(el=>{
    if(!el) html+=`<div></div>`;
    else{
      const methods = detectionMap[el] || [];
      let color = "";
      if(methods.includes("ICP-MS")) color="icp";
      else if(methods.includes("AAS")) color="aas";
      else if(methods.includes("XRF")) color="xrf";
      else if(methods.includes("MS")) color="ms";
      else if(methods.includes("IR")) color="ir";

      const multi = methods.length>1 ? "multi" : "";

      html+=`
        <div class="el ${color} ${multi}">
          ${el}
          <div class="tooltip">${methods.join(", ") || "No data"}</div>
        </div>
      `;
    }
  });
});

html+=`</div>`;
mainBox.innerHTML = html;
}

/* BUTTONS */
document.getElementById("center").onclick = renderPeriodic;
document.getElementById("period").onclick = renderPeriodic;
document.getElementById("analytics").onclick = () => mainBox.innerHTML="<h2>Analytics</h2>";

/* LOAD HOME */
document.getElementById("home").click();

</script>

</body>
</html>
