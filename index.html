<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Futuristic UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    font-family: 'Orbitron', sans-serif;
    color: white;
  }

  /* TOP TITLE */
  .title {
    padding: 20px 40px 0;
    font-size: 22px;
    letter-spacing: 3px;
  }

  /* TOP DIVIDER */
  .divider {
    position: relative;
    margin: 10px 40px 40px;
    height: 2px;
    background: rgba(255,255,255,0.7);
  }

  .divider::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid white;
    background: black;
  }

  /* MAIN WRAP */
  .wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 10px 40px;
  }

  /* MAIN PANEL (MATCH IMAGE) */
  .panel {
    width: 720px;
    height: 260px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.65);
    background: rgba(0,0,0,0.6);
    position: relative;
    box-shadow:
      inset 0 0 20px rgba(255,255,255,0.05),
      0 0 25px rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* CORNER HANDLES (like your screenshot) */
  .panel span {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
  }

  .c1 { top: -5px; left: -5px; }
  .c2 { top: -5px; right: -5px; }
  .c3 { bottom: -5px; left: -5px; }
  .c4 { bottom: -5px; right: -5px; }

  .panel-content {
    opacity: 0.8;
  }

  /* RIGHT HEX ICON CLUSTER */
  .icons {
    display: grid;
    grid-template-columns: repeat(2, 40px);
    gap: 10px;
    align-items: center;
  }

  .hex {
    width: 38px;
    height: 42px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.4);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hex::before {
    content: "▣";
    font-size: 14px;
    opacity: 0.7;
  }

</style>
</head>

<body>

<div class="title">HOMEPAGE</div>

<div class="divider"></div>

<div class="wrap">

  <!-- MAIN PANEL -->
  <div class="panel">

    <span class="c1"></span>
    <span class="c2"></span>
    <span class="c3"></span>
    <span class="c4"></span>

    <div class="panel-content">
      <div>Main DIV</div>
      <div style="opacity:0.6; margin-top:10px;">
        Hkjhkjkjahaksjhcascjhsac<br>
        Bnkajscbajksbcakbcacb<br>
        bjkzcbascbjacsbczkbjc
      </div>
    </div>

  </div>

  <!-- RIGHT ICONS -->
  <div class="icons">
    <div class="hex"></div>
    <div class="hex"></div>
    <div class="hex"></div>
    <div class="hex"></div>
  </div>

</div>

</body>
</html>
