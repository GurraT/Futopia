<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Realistic Glass UI</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      color: #0f172a;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      perspective: 1200px;

      /* CENTER EVERYTHING */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      padding: 20px 40px 0;
      position: relative;
      width: 100%;
      max-width: 1100px;
    }

    /* TOP TITLE */
    .title {
      font-size: 26px;
      letter-spacing: 3px;
      margin: 0;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #9be7ff, transparent);
      margin: 18px 0 30px;
    }

    /* FLOATING ICONS */
    .icons-float {
      position: absolute;
      top: 20px;
      right: 40px;
    }

    /* GLASS EFFECT */
    .glass {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow:
        inset 0 1px 3px rgba(255,255,255,0.9),
        inset 0 -1px 2px rgba(0,0,0,0.05),
        0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.9), transparent 70%);
      opacity: 0.35;
      transform: translateX(-100%);
      animation: shine 6s infinite linear;
    }

    @keyframes shine {
      to { transform: translateX(100%); }
    }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .main-box {
      padding: 40px;
      min-height: 250px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1 class="title">HOMEPAGE</h1>
    <div class="divider"></div>

    <div class="layout">

      <div>
        <div class="main-box glass">
          <h3>Main DIV</h3>
          <p>Ultra realistic glass panel with lighting & depth.</p>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
