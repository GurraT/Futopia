<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultra Realistic Glass UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
/* GLOBAL RESET */
* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
height: 100%;
}

body {
font-family: 'Orbitron', sans-serif;
color: #0f172a;
background: linear-gradient(135deg, #dfe9f3, #ffffff);
perspective: 1200px;
}

/* CONTAINER (NO BOTTOM SPACE) */
.container {
padding: 15px 40px 0 40px;
margin: 0;
}

/* TYPOGRAPHY RESET (removes hidden spacing) */
h3, p {
margin: 0;
}

/* TITLE */
.title {
font-size: 26px;
letter-spacing: 3px;
margin: 0;
}

.divider {
height: 2px;
background: linear-gradient(90deg, transparent, #9be7ff, transparent);
margin: 10px 0 20px;
}

/* LAYOUT */
.layout {
position: relative;
display: flex;
gap: 30px;
align-items: flex-start;
margin: 0;
padding: 0;
}

/* MAIN BOX */
.main-box {
padding: 40px;
min-height: 250px;
flex: 1;
}

/* CONTROLS (NO BOTTOM SPACE) */
.controls {
margin: 10px 0 0 0;
display: flex;
justify-content: center;
align-items: center;
gap: 14px;
}

.btn {
width: 90px;
height: 30px;
}

.arrow, .home {
font-size: 24px;
cursor: pointer;
transition: 0.2s;
}

.arrow:hover {
color: #00bcd4;
transform: scale(1.15);
}

/* GLASS EFFECT */
.glass {
background: rgba(255, 255, 255, 0.35);
backdrop-filter: blur(20px);
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.7);
box-shadow:
inset 0 1px 3px rgba(255,255,255,0.9),
inset 0 -1px 2px rgba(0,0,0,0.05),
0 10px 30px rgba(0,0,0,0.1);
position: relative;
overflow: hidden;
}

.glass::before {
content: "";
position: absolute;
inset: 0;
background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.9), transparent 70%);
opacity: 0.35;
transform: translateX(-100%);
animation: shine 6s infinite linear;
}

@keyframes shine {
to { transform: translateX(100%); }
}

/* HEX ICONS (NO WRAPPER DIV) */
.hex {
position: absolute;
width: 34px;
height: 38px;
background: rgba(255,255,255,0.6);
border: 1px solid rgba(255,255,255,0.9);
clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(10px);
box-shadow: inset 0 1px 2px rgba(255,255,255,0.9);
transition: 0.25s;
transform: scale(0.9);
}

.hex img {
width: 18px;
height: 18px;
}

.hex:hover {
transform: scale(1.25);
}

/* ICON POSITIONING (RIGHT SIDE STACK) */
.icon-set {
right: 40px;
}

.center { top: 20px; }
.h1 { top: 90px; }
.h2 { top: 160px; }
.h3 { top: 230px; }
.h4 { top: 300px; }
.h5 { top: 370px; }
.h6 { top: 440px; }

</style>
</head>

<body>

<div class="container">

<h1 class="title">HOMEPAGE</h1>
<div class="divider"></div>

<div class="layout">

  <!-- MAIN -->
  <div style="flex:1;">
    <div class="main-box glass">
      <h3>Main DIV</h3>
      <p>Ultra realistic glass panel with lighting & depth.</p>
    </div>

    <div class="controls">
      <div class="btn glass"></div>
      <div class="arrow">⬅</div>
      <div class="home">⌂</div>
      <div class="arrow">➡</div>
      <div class="btn glass"></div>
    </div>
  </div>

  <!-- ICONS (NO WRAPPER DIVS) -->
  <a class="hex center icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/spectrometer.png"></a>
  <a class="hex h1 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/test-tube.png"></a>
  <a class="hex h2 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/molecule.png"></a>
  <a class="hex h3 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/chemical-plant.png"></a>
  <a class="hex h4 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/mass-spectrometry.png"></a>
  <a class="hex h5 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/laser-beam.png"></a>
  <a class="hex h6 icon-set" href="#"><img src="https://img.icons8.com/ios-filled/50/periodic-table.png"></a>

</div>

</div>

</body>
</html>
