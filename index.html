<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Realistic Glass UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: #0f172a;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      perspective: 1200px;
    }

    .container {
      padding: 30px 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      letter-spacing: 3px;
      margin: 0;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #9be7ff, transparent);
      margin: 20px 0 30px;
    }

    /* ULTRA GLASS */
    .glass {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow:
        inset 0 1px 3px rgba(255,255,255,0.9),
        inset 0 -1px 2px rgba(0,0,0,0.05),
        0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    /* moving shine */
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.9), transparent 70%);
      opacity: 0.4;
      transform: translateX(-100%);
      animation: shine 6s infinite linear;
    }

    @keyframes shine {
      to { transform: translateX(100%); }
    }

    /* chrome border glow */
    .glass::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(120deg, #fff, #9be7ff, #fff);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* HEX ICONS */
    .icons {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .hex {
      position: absolute;
      width: 30px;
      height: 34px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.9);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.9);
      transition: 0.3s;
    }

    .hex:hover {
      transform: scale(1.3);
      box-shadow: 0 0 15px rgba(0,200,255,0.6);
    }

    .hex.center {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(200,240,255,0.9);
    }

    .hex.h1 { top: 0%; left: 50%; transform: translate(-50%, 0); }
    .hex.h2 { top: 25%; left: 80%; transform: translate(-50%, -50%); }
    .hex.h3 { top: 75%; left: 80%; transform: translate(-50%, -50%); }
    .hex.h4 { top: 100%; left: 50%; transform: translate(-50%, -100%); }
    .hex.h5 { top: 75%; left: 20%; transform: translate(-50%, -50%); }
    .hex.h6 { top: 25%; left: 20%; transform: translate(-50%, -50%); }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }

    .main-box {
      padding: 40px;
      min-height: 250px;
    }

    .side-box {
      padding: 30px;
      min-height: 200px;
    }

    .controls {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .btn {
      width: 120px;
      height: 40px;
    }

    .arrow, .home {
      font-size: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    .arrow:hover {
      color: #00bcd4;
      transform: scale(1.2);
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>HOMEPAGE</h1>

      <div class="icons">
        <div class="hex center">⚙</div>
        <div class="hex h1">📊</div>
        <div class="hex h2">📁</div>
        <div class="hex h3">📋</div>
        <div class="hex h4">🔍</div>
        <div class="hex h5">🧠</div>
        <div class="hex h6">⚡</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="layout">
      <div>
        <div class="main-box glass" id="mainGlass">
          <h3>Main DIV</h3>
          <p>Ultra realistic glass panel with lighting & depth.</p>
        </div>

        <div class="controls">
          <div class="btn glass"></div>
          <div class="arrow">⬅</div>
          <div class="home">⌂</div>
          <div class="arrow">➡</div>
          <div class="btn glass"></div>
        </div>
      </div>

      <div class="side-box glass">
        <h3>Side div</h3>
        <p>Floating layered UI</p>
      </div>
    </div>

  </div>

  <script>
    // PARALLAX / DEPTH EFFECT
    const glass = document.getElementById('mainGlass');

    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.clientX) / 25;
      const y = (window.innerHeight / 2 - e.clientY) / 25;

      glass.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });
  </script>

</body>
</html>
