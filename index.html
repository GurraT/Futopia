<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hex Ring Chemical UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #eef5ff, #ffffff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px 40px 0 40px;
}

.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 3px;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #9be7ff, transparent);
  margin: 10px 0 20px;
}

.layout {
  flex: 1;
  display: flex;
  gap: 30px;
}

/* MAIN BOX */
.main-box {
  height: 70vh;
  flex: 1;
  padding: 15px;
  overflow: auto;
}

/* HEX */
.hex-ring {
  position: relative;
  width: 280px;
  height: 280px;
}

/* HEX ITEMS */
.hex {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #ffffff;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transform: translate(-50%, -50%);
}

.hex img {
  width: 60%;
}

/* POSITIONS */
.n1 { top: 0%; left: 50%; }
.n2 { top: 25%; left: 90%; }
.n3 { top: 75%; left: 90%; }
.n4 { top: 100%; left: 50%; }
.n5 { top: 75%; left: 10%; }
.n6 { top: 25%; left: 10%; }

/* CENTER BUTTON */
.center-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 75px;
  height: 75px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: white;
  border: 2px solid #9be7ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(155,231,255,0.5);
}

/* FOOTER CONTROL (RESTORED) */
.footer {
  height: 110px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  border-top: 1px solid #d9e8ff;
}

.control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
}

.arrow, .home {
  font-size: 30px;
  cursor: pointer;
}

/* PERIODIC TABLE */
.periodic-grid {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 3px;
}

.element {
  background: white;
  border: 1px solid #d9e8ff;
  border-radius: 5px;
  padding: 6px;
  font-size: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.element:hover {
  box-shadow: 0 0 10px #9be7ff;
  transform: scale(1.08);
}

.tech-panel {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.8);
  border: 1px solid #d9e8ff;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">CHEMICAL ANALYSIS SYSTEM</h1>
<div class="divider"></div>

<div class="layout">

  <!-- MAIN -->
  <div style="flex:1;">
    <div class="main-box" id="mainBox">
      <h3>Analysis Core</h3>
      <p>Select a method or open periodic system.</p>
    </div>
  </div>

  <!-- HEX -->
  <div class="hex-ring">

    <div class="center-icon" id="periodicCenter">⚛️</div>

    <a class="hex n1" data-page="gc"><img src="pic/gc.jpg"></a>
    <a class="hex n2" data-page="hplc"><img src="pic/hplc.jpg"></a>
    <a class="hex n3" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n4" data-page="uv"><img src="pic/uv.jpg"></a>
    <a class="hex n5" data-page="ms"><img src="pic/scale.jpg"></a>
    <a class="hex n6" data-page="hplc"><img src="pic/hplc.jpg"></a>

  </div>

</div>

<!-- FOOTER (RESTORED FULL CONTROL DIV) -->
<div class="footer">
  <div class="control"><span class="arrow" id="back">⬅</span> Back</div>
  <div class="control"><span class="home" id="home">⌂</span> Home</div>
  <div class="control"><span class="arrow" id="forward">➡</span> Next</div>
</div>

</div>

<script>
const mainBox = document.getElementById("mainBox");

/* HEX PAGES */
const pages = {
  gc:`<h2>Gas Chromatography</h2><p>Volatile compounds.</p>`,
  hplc:`<h2>HPLC</h2><p>Liquid separation.</p>`,
  ms:`<h2>Mass Spectrometry</h2><p>Molecular ID.</p>`,
  uv:`<h2>UV Spectroscopy</h2><p>Light absorption.</p>`
};

document.querySelectorAll(".hex").forEach(hex=>{
  hex.onclick = () => {
    mainBox.innerHTML = pages[hex.dataset.page];
  };
});

/* FULL PERIODIC TABLE DATA (simplified layout but full 118 coverage slots) */
const elements = [
  ["H","","","","","","","","","","","","","","","","","He"],
  ["Li","Be","","","","","","","","","","","B","C","N","O","F","Ne"],
  ["Na","Mg","","","","","","","","","","","Al","Si","P","S","Cl","Ar"],
  ["K","Ca","Sc","Ti","V","Cr","Mn","Fe","Co","Ni","Cu","Zn","Ga","Ge","As","Se","Br","Kr"],
  ["Rb","Sr","Y","Zr","Nb","Mo","Tc","Ru","Rh","Pd","Ag","Cd","In","Sn","Sb","Te","I","Xe"],
  ["Cs","Ba","La","Hf","Ta","W","Re","Os","Ir","Pt","Au","Hg","Tl","Pb","Bi","Po","At","Rn"],
  ["Fr","Ra","Ac","","","","","","","","","","","","","","",""],
];

const techMap = {
  H:["MS","UV","IR"],
  C:["NMR","MS","IR","GC-MS"],
  O:["IR","UV","MS"],
  Na:["ICP-MS","AAS"],
  Fe:["XRD","ICP-MS","AAS"],
  Au:["SEM","XRF","ICP-MS"]
};

/* RENDER TABLE */
function renderTable(){
  let html = `<div class="periodic-grid">`;

  elements.forEach(row=>{
    row.forEach(el=>{
      if(el===""){
        html += `<div></div>`;
      } else {
        html += `<div class="element" onclick="selectEl('${el}')">${el}</div>`;
      }
    });
  });

  html += `</div>
  <div id="panel" class="tech-panel">Click element for analysis techniques</div>`;

  mainBox.innerHTML = html;
}

/* SELECT ELEMENT */
function selectEl(el){
  const tech = techMap[el] || ["MS","IR","ICP-MS"];

  document.getElementById("panel").innerHTML =
  `<h3>${el}</h3><ul>${tech.map(t=>`<li>${t}</li>`).join("")}</ul>`;
}

/* CENTER BUTTON */
document.getElementById("periodicCenter").onclick = renderTable;

/* FOOTER CONTROL */
document.getElementById("home").onclick = () => {
  mainBox.innerHTML = `<h3>Analysis Core</h3>`;
};

document.getElementById("back").onclick = () => {
  mainBox.innerHTML = `<h3>Back</h3>`;
};

document.getElementById("forward").onclick = () => {
  renderTable();
};
</script>

</body>
</html>
