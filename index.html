<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #ccc;
      font-family: 'Orbitron', sans-serif;
    }

    .container {
      padding: 40px;
    }

    h1 {
      color: #fff;
      letter-spacing: 2px;
    }

    .divider {
      height: 1px;
      background: #666;
      margin: 20px 0 40px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: start;
    }

    .main-box {
      border: 2px solid #888;
      border-radius: 30px;
      padding: 40px;
      text-align: center;
      min-height: 250px;
    }

    .side-box {
      border: 2px solid #888;
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      min-height: 200px;
    }

    .icons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 20px;
    }

    .icon {
      width: 50px;
      height: 50px;
      border: 1px solid #777;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 20px;
    }

    .controls {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .btn {
      width: 120px;
      height: 40px;
      border: 1px solid #777;
      border-radius: 10px;
    }

    .arrow {
      font-size: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    .arrow:hover {
      color: #fff;
      transform: scale(1.2);
    }

    .home {
      font-size: 30px;
    }

    /* Glow effect */
    .main-box, .side-box, .btn, .icon {
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .main-box:hover, .side-box:hover, .btn:hover {
      box-shadow: 0 0 20px rgba(0,255,255,0.5);
      border-color: cyan;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>HOMEPAGE</h1>
    <div class="divider"></div>

    <div class="icons">
      <div class="icon">📊</div>
      <div class="icon">📁</div>
      <div class="icon">📋</div>
      <div class="icon">🔍</div>
    </div>

    <div class="layout">
      <div>
        <div class="main-box">
          <h3>Main DIV</h3>
          <p>
            Futuristic content goes here.<br>
            Replace with real data, dashboard or visuals.
          </p>
        </div>

        <div class="controls">
          <div class="btn"></div>
          <div class="arrow">⬅</div>
          <div class="home">⌂</div>
          <div class="arrow">➡</div>
          <div class="btn"></div>
        </div>
      </div>

      <div class="side-box">
        <h3>Side div</h3>
        <p>
          Secondary content<br>
          Links / Stats / Info
        </p>
      </div>
    </div>

  </div>

</body>
</html>
